<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blufox Lunch Punch Audit</title>
<!-- xlsx-js-style is a drop-in fork of SheetJS that preserves the .s style property
     on cells, so cell fills/fonts survive writeFile. Same XLSX global, same API. -->
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0f14;--surface:#151921;--surface2:#1c2230;--surface3:#232a3a;--border:#2a3142;--accent:#f97316;--accent-dim:rgba(249,115,22,0.15);--green:#22c55e;--green-dim:rgba(34,197,94,0.15);--red:#ef4444;--red-dim:rgba(239,68,68,0.12);--yellow:#eab308;--yellow-dim:rgba(234,179,8,0.12);--blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);--purple:#a855f7;--purple-dim:rgba(168,85,247,0.12);--text:#e8ecf4;--text-dim:#8892a5;--text-muted:#5a6478}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
.header{padding:28px 32px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;background:linear-gradient(180deg,rgba(249,115,22,0.04) 0%,transparent 100%)}
.header-icon{width:44px;height:44px;border-radius:10px;background:var(--accent-dim);border:1px solid rgba(249,115,22,0.25);display:flex;align-items:center;justify-content:center;font-size:22px}
.header h1{font-size:22px;font-weight:700;letter-spacing:-0.3px}
.header h1 span{color:var(--accent)}
.header p{color:var(--text-dim);font-size:13px;margin-top:2px}
.upload-zone{margin:24px 32px;border:2px dashed var(--border);border-radius:14px;padding:48px 24px;text-align:center;cursor:pointer;transition:all 0.25s;background:var(--surface)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:var(--accent-dim)}
.upload-zone .icon{font-size:40px;margin-bottom:12px;opacity:0.8}
.upload-zone .label{font-size:15px;font-weight:600}
.upload-zone .sub{font-size:12px;color:var(--text-dim);margin-top:6px}
.upload-zone input{display:none}
.file-badge{display:inline-flex;align-items:center;gap:8px;background:var(--green-dim);border:1px solid rgba(34,197,94,0.3);border-radius:8px;padding:8px 14px;margin-top:12px;font-size:13px;font-weight:500;color:var(--green)}
.dashboard{display:none;padding:0 32px 40px}.dashboard.active{display:block}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin:24px 0}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.orange::before{background:var(--accent)}.stat-card.red::before{background:var(--red)}.stat-card.green::before{background:var(--green)}.stat-card.yellow::before{background:var(--yellow)}.stat-card.blue::before{background:var(--blue)}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim)}
.stat-value{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;margin-top:6px}
.stat-card.orange .stat-value{color:var(--accent)}.stat-card.red .stat-value{color:var(--red)}.stat-card.green .stat-value{color:var(--green)}.stat-card.yellow .stat-value{color:var(--yellow)}.stat-card.blue .stat-value{color:var(--blue)}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:4px}
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:20px 0 16px}
.filter-bar label{font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px}
.filter-bar select,.filter-bar input{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--accent)}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.tabs{display:flex;gap:2px;margin:20px 0 0;background:var(--surface);border-radius:10px;padding:4px;border:1px solid var(--border);width:fit-content}
.tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-dim);transition:all 0.2s;border:none;background:transparent;font-family:'DM Sans',sans-serif}
.tab.active{background:var(--accent);color:#fff}
.tab:hover:not(.active){color:var(--text)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:16px}
.table-wrap table{width:100%;border-collapse:collapse}
.table-wrap th{background:var(--surface2);padding:12px 16px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-dim);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2}
.table-wrap td{padding:10px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
.table-wrap tr:last-child td{border-bottom:none}
.table-wrap tbody tr:hover td{background:rgba(249,115,22,0.04)}
.table-scroll{max-height:560px;overflow-y:auto}
.table-scroll::-webkit-scrollbar{width:6px}
.table-scroll::-webkit-scrollbar-track{background:var(--surface)}
.table-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;font-family:'Space Mono',monospace}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-green{background:var(--green-dim);color:var(--green)}
.badge-yellow{background:var(--yellow-dim);color:var(--yellow)}
.badge-orange{background:var(--accent-dim);color:var(--accent)}
.badge-blue{background:var(--blue-dim);color:var(--blue)}
.badge-purple{background:var(--purple-dim);color:var(--purple)}
.clickable{cursor:pointer;text-decoration:underline;text-decoration-color:rgba(249,115,22,0.4);text-underline-offset:3px;transition:color 0.15s}
.clickable:hover{color:var(--accent)}
.store-bar{display:flex;align-items:center;gap:10px}
.store-bar-fill{height:8px;border-radius:4px;min-width:4px;transition:width 0.5s ease}
.breadcrumb{display:flex;align-items:center;gap:6px;margin:16px 0 8px;font-size:13px;flex-wrap:wrap}
.breadcrumb a{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:600}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb span{color:var(--text-muted)}
.breadcrumb .current{color:var(--text);font-weight:600}
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-top:12px}
.export-bar{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap;align-items:center}
.export-bar-secondary{margin-top:8px;opacity:0.85}
.export-hint{font-size:11px;color:var(--text-muted);margin-right:4px}
.no-data{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px}
.hidden{display:none!important}

.punch-visual{display:flex;align-items:flex-start;gap:0;flex-wrap:nowrap;overflow-x:auto;padding:4px 0}
.punch-step{display:flex;flex-direction:column;align-items:center;min-width:80px}
.punch-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;border:3px solid}
.punch-circle.filled-green{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.punch-circle.filled-red{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.punch-circle.filled-yellow{background:var(--yellow-dim);border-color:var(--yellow);color:var(--yellow)}
.punch-circle.empty-slot{background:transparent;border-color:var(--border);border-style:dashed;color:var(--text-muted)}
.punch-connector{height:4px;flex:1;min-width:16px;border-radius:2px}
.punch-connector.ok{background:var(--green-dim)}
.punch-connector.miss{background:var(--red-dim);background-image:repeating-linear-gradient(90deg,var(--red) 0,var(--red) 6px,transparent 6px,transparent 12px);background-size:12px 4px}
.punch-connector.neutral{background:var(--border)}
.punch-time-label{font-family:'Space Mono',monospace;font-size:11px;margin-top:4px;white-space:nowrap}
.punch-time-label.late{color:var(--red);font-weight:700}
.punch-time-label.ok{color:var(--green)}
.punch-time-label.miss{color:var(--red);font-weight:700}
.punch-name{font-size:10px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.3px;margin-top:1px}

.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.status-pill.perfect{background:var(--green-dim);color:var(--green)}
.status-pill.warning{background:var(--yellow-dim);color:var(--yellow)}
.status-pill.problem{background:var(--red-dim);color:var(--red)}

.calendar-wrap{margin-top:16px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.cal-header{font-size:11px;font-weight:700;color:var(--text-dim);text-align:center;padding:6px 0;text-transform:uppercase;letter-spacing:0.5px}
.cal-day{border-radius:8px;padding:6px 4px;text-align:center;min-height:56px;font-size:11px;border:1px solid transparent;transition:all 0.15s}
.cal-day.empty{opacity:0}
.cal-day .day-num{font-weight:700;font-size:12px;font-family:'Space Mono',monospace;margin-bottom:2px}
.cal-day.has-violation{background:var(--red-dim);border-color:rgba(239,68,68,0.2)}
.cal-day.has-late{background:var(--yellow-dim);border-color:rgba(234,179,8,0.2)}
.cal-day.has-both{background:linear-gradient(135deg,var(--red-dim),var(--yellow-dim));border-color:rgba(239,68,68,0.2)}
.cal-day.clean{background:var(--surface2);border-color:var(--border)}
.cal-day .cal-dots{display:flex;gap:3px;justify-content:center;margin-top:3px}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-dot.red{background:var(--red)}.cal-dot.yellow{background:var(--yellow)}.cal-dot.green{background:var(--green)}
.cal-legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim)}
.cal-legend-dot{width:10px;height:10px;border-radius:3px}

.day-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:8px}
.day-card.has-issue{border-left:4px solid var(--red)}
.day-card.is-clean{border-left:4px solid var(--green)}
.day-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.day-card-date{font-weight:700;font-size:14px}

@media(max-width:768px){
  .header,.dashboard{padding-left:16px;padding-right:16px}
  .upload-zone{margin:16px}
  .stat-grid{grid-template-columns:1fr 1fr}
  .punch-step{min-width:65px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🕐</div>
  <div>
    <h1><span>Blufox</span> Lunch Punch Audit</h1>
    <p>Upload your TimeCards extract to audit lunch punches, tardiness &amp; manager compliance</p>
  </div>
</div>

<div class="upload-zone" id="uploadZone">
  <div class="icon">📂</div>
  <div class="label">Drop your TimeCards Excel file here</div>
  <div class="sub">or click to browse — accepts .xlsx / .xls</div>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
  <div id="fileBadge"></div>
</div>

<div class="dashboard" id="dashboard">
  <div class="stat-grid" id="statGrid"></div>
  <div class="filter-bar">
    <label>Store:</label>
    <select id="filterStore"><option value="all">All My Stores</option></select>
    <label>District:</label>
    <select id="filterDistrict"><option value="all">All Districts</option></select>
    <label>Search:</label>
    <input type="text" id="filterName" placeholder="Employee name..." style="width:180px">
    <button class="btn btn-outline btn-sm" onclick="resetFilters()">Reset</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="store">By Store</button>
    <button class="tab" data-tab="employee">By Employee</button>
    <button class="tab" data-tab="manager">Managers</button>
  </div>
  <div id="panelStore"></div>
  <div id="panelEmployee" class="hidden"></div>
  <div id="panelManager" class="hidden"></div>

  <!-- Primary: Excel exports with highlighting -->
  <div class="export-bar">
    <span class="export-hint">🎨 Highlighted Excel:</span>
    <button class="btn btn-outline" onclick="doExportXLSX('violations')">⬇ Missed Lunches</button>
    <button class="btn btn-outline" onclick="doExportXLSX('late')">⬇ Late Arrivals</button>
    <button class="btn" onclick="doExportXLSX('all')">⬇ Export All (Highlighted)</button>
  </div>
  <!-- Secondary: Plain CSV (no formatting, but small & universal) -->
  <div class="export-bar export-bar-secondary">
    <span class="export-hint">Plain CSV:</span>
    <button class="btn btn-outline btn-sm" onclick="doExport('violations')">Violations CSV</button>
    <button class="btn btn-outline btn-sm" onclick="doExport('late')">Late CSV</button>
    <button class="btn btn-outline btn-sm" onclick="doExport('all')">All CSV</button>
  </div>
</div>

<script>
const MY_STORES=['Bourbonnais','Burbank','Cicero','Dekalb','Elkhart','Evanston','Evergreen Park','Frankfort','Glenview','Greeneville','Hammond','Johnson City','Kildeer','Michigan City','Oak Ridge','Round Lake Beach','Schererville','South Bend','South Knoxville','South Skokie','Tinley Park','Uptown','Valparaiso'];
const DISTRICTS={'Big South':['Greeneville','Johnson City','Oak Ridge','South Knoxville','Uptown'],'Indiana Outlawz':['Elkhart','Michigan City','South Bend','Valparaiso'],'South Side':['Bourbonnais','Burbank','Cicero','Evergreen Park','Frankfort','Tinley Park'],'North Side':['Dekalb','Evanston','Glenview','Hammond','Kildeer','Round Lake Beach','Schererville','South Skokie']};
const MGR_TITLES=['Store Manager','DM','Ops Coordinator'];
function getDist(s){for(const[d,st]of Object.entries(DISTRICTS)){if(st.includes(s))return d;}return'Unknown';}
function esc(s){return s.replace(/'/g,"\\'");}

/*************************************************************
 * TIMEZONE-SAFE DATE/TIME EXTRACTION
 *************************************************************/
function localDateStr(d){
  if(!(d instanceof Date))return String(d).slice(0,10);
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function localTimeStr(d){
  if(!(d instanceof Date)){
    const s=String(d);
    const m=s.match(/(\d{2}:\d{2}:\d{2})/);
    return m?m[1]:'00:00:00';
  }
  const h=String(d.getHours()).padStart(2,'0');
  const m=String(d.getMinutes()).padStart(2,'0');
  const s=String(d.getSeconds()).padStart(2,'0');
  return `${h}:${m}:${s}`;
}
function localHHMM(d){
  if(!(d instanceof Date)){
    const s=String(d);
    const m=s.match(/(\d{2}:\d{2})/);
    return m?m[1]:'00:00';
  }
  const h=String(d.getHours()).padStart(2,'0');
  const m=String(d.getMinutes()).padStart(2,'0');
  return `${h}:${m}`;
}

function to12(hhmm){
  if(!hhmm||hhmm.length<5)return'—';
  const parts=hhmm.split(':');
  let h=parseInt(parts[0],10);
  const m=parts[1];
  const ampm=h>=12?'PM':'AM';
  if(h===0)h=12;else if(h>12)h-=12;
  return `${h}:${m} ${ampm}`;
}
function to12Short(hhmm){
  if(!hhmm||hhmm.length<4)return'';
  const parts=hhmm.split(':');
  let h=parseInt(parts[0],10);
  const m=parts[1];
  const ampm=h>=12?'p':'a';
  if(h===0)h=12;else if(h>12)h-=12;
  return `${h}:${m}${ampm}`;
}

function dayOfWeekFromStr(ds){return new Date(ds+'T12:00:00').getDay();}
function dayFull(ds){return['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dayOfWeekFromStr(ds)];}
function formatDateNice(ds){const d=new Date(ds+'T12:00:00');const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;}

// ===== DATA =====
let dayRecords=[];
let drill=null;

function parseExcel(data){
  const wb=XLSX.read(data,{type:'array',cellDates:true});
  let sn=wb.SheetNames.find(s=>s.toLowerCase().includes('punch'))||wb.SheetNames[0];
  const ws=wb.Sheets[sn];
  const rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});

  if(!rows.length){alert('No data found');return;}
  const H=Object.keys(rows[0]);
  const cS=H.find(h=>/^store$/i.test(h.trim()))||H[0];
  const cN=H.find(h=>/^name$/i.test(h.trim()))||H[2];
  const cE=H.find(h=>/employee.?id/i.test(h.trim()))||H[3];
  const cD=H.find(h=>/^date$/i.test(h.trim()))||H[4];
  const cT=H.find(h=>/^title$/i.test(h.trim()))||H[5];
  const cP=H.find(h=>/punch.?time/i.test(h.trim()))||H[6];

  const rows2=XLSX.utils.sheet_to_json(ws,{defval:'',raw:true});

  const grouped={};
  rows2.forEach(r=>{
    const store=(r[cS]||'').toString().trim();
    if(!MY_STORES.includes(store))return;

    const dateRaw=r[cD];
    const punchRaw=r[cP];

    const dateStr=localDateStr(dateRaw);
    const timeHHMMSS=localTimeStr(punchRaw);

    const k=`${store}||${(r[cE]||'')}||${dateStr}`;
    if(!grouped[k])grouped[k]={
      store,
      name:(r[cN]||'').toString().trim(),
      empId:(r[cE]||'').toString().trim(),
      title:(r[cT]||'').toString().trim(),
      date:dateStr,
      punches:[]
    };
    grouped[k].punches.push(timeHHMMSS);
  });

  dayRecords=Object.values(grouped).map(d=>{
    d.punches.sort();
    d.cnt=d.punches.length;
    d.isMgr=MGR_TITLES.includes(d.title);
    d.noLunch=d.cnt<4&&d.cnt>=1;
    d.dayNum=dayOfWeekFromStr(d.date);
    d.district=getDist(d.store);

    const ft=d.punches[0]?d.punches[0].slice(0,5):'';
    d.firstTime=ft;
    const fh=parseInt(ft.split(':')[0],10);
    d.shift=fh<11?'opener':'closer';

    d.isLate=false; d.lateReason=''; d.lateDetail='';
    if(d.isMgr){
      let cut=d.dayNum===1?'09:00':d.dayNum===2?'08:30':'09:40';
      d.mgrCutoff=cut;
      if(ft>cut){d.isLate=true;d.lateReason='LATE';d.lateDetail=`Clocked in ${to12Short(ft)}, should be in by ${to12Short(cut)}`;}
    }else{
      if(d.shift==='opener'&&ft>'09:40'){d.isLate=true;d.lateReason='LATE';d.lateDetail=`Clocked in ${to12Short(ft)}, opener due by ${to12Short('09:40')}`;}
      else if(d.shift==='closer'&&ft>'12:10'){d.isLate=true;d.lateReason='LATE';d.lateDetail=`Clocked in ${to12Short(ft)}, closer due by ${to12Short('12:10')}`;}
    }
    return d;
  });
  buildDashboard();
}

// ===== FILE HANDLING =====
const uz=document.getElementById('uploadZone'),fi=document.getElementById('fileInput');
uz.addEventListener('click',()=>fi.click());
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('dragover');});
uz.addEventListener('dragleave',()=>uz.classList.remove('dragover'));
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('dragover');if(e.dataTransfer.files.length)hf(e.dataTransfer.files[0]);});
fi.addEventListener('change',e=>{if(e.target.files.length)hf(e.target.files[0]);});
function hf(f){document.getElementById('fileBadge').innerHTML=`<div class="file-badge">✔ ${f.name} (${(f.size/1024).toFixed(0)} KB)</div>`;const r=new FileReader();r.onload=e=>parseExcel(e.target.result);r.readAsArrayBuffer(f);}

function buildDashboard(){
  document.getElementById('dashboard').classList.add('active');
  const ss=document.getElementById('filterStore');ss.innerHTML='<option value="all">All My Stores</option>';
  [...new Set(dayRecords.map(d=>d.store))].sort().forEach(s=>{ss.innerHTML+=`<option value="${s}">${s}</option>`;});
  const ds=document.getElementById('filterDistrict');ds.innerHTML='<option value="all">All Districts</option>';
  Object.keys(DISTRICTS).sort().forEach(d=>{ds.innerHTML+=`<option value="${d}">${d}</option>`;});
  document.getElementById('filterStore').onchange=()=>{drill=null;renderAll();};
  document.getElementById('filterDistrict').onchange=()=>{drill=null;renderAll();};
  document.getElementById('filterName').oninput=()=>{drill=null;renderAll();};
  drill=null;renderAll();
}

function filt(mo){
  let d=[...dayRecords];
  const sv=document.getElementById('filterStore').value;
  const dv=document.getElementById('filterDistrict').value;
  const nv=document.getElementById('filterName').value.toLowerCase().trim();

// ===== VISUAL PUNCH TIMELINE =====
function punchVis(d){
  const labels=['🟢 Clock In','🔴 Lunch Out','🟢 Lunch Back','🔴 Clock Out'];
  const p=d.punches;
  let html='<div class="punch-visual">';
  for(let i=0;i<4;i++){
    if(i>0){
      const hasBoth=!!p[i-1]&&!!p[i];
      const connCls=hasBoth?'ok':(p[i]?'neutral':'miss');
      html+=`<div class="punch-connector ${connCls}" style="margin-top:10px"></div>`;
    }
    const hasPunch=!!p[i];
    let circCls,icon;
    if(hasPunch){
      const isLateHere=i===0&&d.isLate;
      circCls=isLateHere?'filled-yellow':'filled-green';
      icon=isLateHere?'⚠':'✓';
    }else{
      circCls='empty-slot';icon='✗';
    }
    const timeLabel=hasPunch?to12(p[i].slice(0,5)):'MISSED';
    const timeCls=!hasPunch?'miss':(i===0&&d.isLate?'late':'ok');
    html+=`<div class="punch-step">
      <div class="punch-circle ${circCls}">${icon}</div>
      <div class="punch-time-label ${timeCls}">${timeLabel}</div>
      <div class="punch-name">${labels[i]}</div>
    </div>`;
  }
  html+='</div>';
  return html;
}

function statusPill(d){
  const issues=[];
  if(d.noLunch)issues.push('❌ No Lunch Punch');
  if(d.isLate)issues.push('⚠️ '+d.lateDetail);
  if(!issues.length)return'<span class="status-pill perfect">✅ All Good</span>';
  const cls=d.noLunch?'problem':'warning';
  return issues.map(i=>`<span class="status-pill ${cls}">${i}</span>`).join(' ');
}

// ===== CALENDAR =====
function buildCal(empDays){
  if(!empDays.length)return'';
  const dates=empDays.map(d=>d.date).sort();
  const first=new Date(dates[0]+'T12:00:00'),last=new Date(dates[dates.length-1]+'T12:00:00');
  const lookup={};empDays.forEach(d=>{lookup[d.date]=d;});
  let h=`<div class="calendar-wrap"><div class="cal-legend">
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--red)"></div> Missed Lunch</div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--yellow)"></div> Late Arrival</div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--green)"></div> Clean Day</div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--surface2);border:1px solid var(--border)"></div> No Shift</div>
  </div>`;
  let cur=new Date(first.getFullYear(),first.getMonth(),1);
  const end=new Date(last.getFullYear(),last.getMonth(),1);
  while(cur<=end){
    const yr=cur.getFullYear(),mo=cur.getMonth();
    const mn=cur.toLocaleString('default',{month:'long',year:'numeric'});
    const dim=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay();
    h+=`<div style="margin-top:16px"><div style="font-weight:700;font-size:14px;margin-bottom:6px">${mn}</div><div class="calendar-grid">`;
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{h+=`<div class="cal-header">${d}</div>`;});
    for(let i=0;i<fd;i++)h+=`<div class="cal-day empty"></div>`;
    for(let day=1;day<=dim;day++){
      const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const rec=lookup[ds];let cls='cal-day',dots='';
      if(rec){
        if(rec.noLunch&&rec.isLate)cls+=' has-both';
        else if(rec.noLunch)cls+=' has-violation';
        else if(rec.isLate)cls+=' has-late';
        else cls+=' clean';
        if(rec.noLunch)dots+=`<div class="cal-dot red"></div>`;
        if(rec.isLate)dots+=`<div class="cal-dot yellow"></div>`;
        if(!rec.noLunch&&!rec.isLate)dots+=`<div class="cal-dot green"></div>`;
      }
      const tip=rec?`title="${dayFull(ds)}: ${rec.cnt} punches, In: ${to12Short(rec.firstTime)}${rec.isLate?' ⚠ LATE':''}${rec.noLunch?' ⚠ NO LUNCH':''}"`:'';
      h+=`<div class="${cls}" ${tip}><div class="day-num">${day}</div>${dots?`<div class="cal-dots">${dots}</div>`:''}</div>`;
    }
    h+=`</div></div>`;
    cur=new Date(yr,mo+1,1);
  }
  h+=`</div>`;return h;
}

/*************************************************************
 * EXPORT — SHARED ROW BUILDING
 *************************************************************/
const EXPORT_HEADERS = ['Store','District','Employee','Employee ID','Title','Date','Day','Shift','Clock In','Punch 2','Punch 3','Clock Out','Total Punches','No Lunch','Is Late','Late Detail'];

function buildRows(type){
  const a=filt();
  let rows;
  if(type==='violations')rows=a.filter(d=>d.noLunch);
  else if(type==='late')rows=a.filter(d=>d.isLate);
  else rows=a;
  // Stable sort: store, then date, then employee name
  rows.sort((x,y)=>{
    if(x.store!==y.store)return x.store<y.store?-1:1;
    if(x.date!==y.date)return x.date<y.date?-1:1;
    return x.name<y.name?-1:1;
  });
  return rows;
}

/*************************************************************
 * PLAIN CSV EXPORT — now works reliably cross-browser
 *
 * Fixes applied vs. the old broken version:
 *   1. The <a> element is appended to document.body BEFORE .click() —
 *      Firefox and Safari silently no-op if the link isn't in the DOM.
 *   2. URL.revokeObjectURL(...) is deferred 1s so the browser has
 *      time to actually start the download before the blob is freed.
 *   3. A UTF-8 BOM is prepended so Excel opens special chars correctly.
 *   4. Commas inside the "Late Detail" field are now quoted/escaped.
 *************************************************************/
function csvEscape(v){
  const s=String(v==null?'':v);
  if(/[",\n]/.test(s)) return '"'+s.replace(/"/g,'""')+'"';
  return s;
}

function doExport(type){
  const rows=buildRows(type);
  if(!rows.length){alert('No data to export.');return;}
  const lines=[EXPORT_HEADERS.join(',')];
  rows.forEach(d=>{
    const p=d.punches;
    lines.push([
      d.store,d.district,d.name,d.empId,d.title,d.date,dayFull(d.date),d.shift,
      to12(p[0]?.slice(0,5)),
      to12(p[1]?.slice(0,5)),
      to12(p[2]?.slice(0,5)),
      to12(p[3]?.slice(0,5)),
      d.cnt,
      d.noLunch?'YES':'No',
      d.isLate?'YES':'No',
      d.lateDetail||''
    ].map(csvEscape).join(','));
  });
  const csv=lines.join('\n');
  // UTF-8 BOM so Excel renders em-dashes / accents correctly
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const fn=`blufox_${type}_${new Date().toISOString().slice(0,10)}.csv`;
  const a=document.createElement('a');
  a.href=url; a.download=fn; a.style.display='none';
  document.body.appendChild(a);     // <-- critical for Firefox/Safari
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1500);  // <-- don't revoke too early
}

/*************************************************************
 * HIGHLIGHTED XLSX EXPORT
 *
 * Row coloring:
 *   - Missed lunch (no matter if late or not) → light red row fill
 *   - Late (no lunch issue)                    → light yellow row fill
 *   - Both (late AND missed lunch)             → light orange row fill
 *   - Clean                                    → no fill
 *
 * Cell accents on problem rows:
 *   - "Total Punches" + "No Lunch" cells      → bright red / white bold
 *   - "Clock In" + "Is Late" cells (if late)  → bright amber / black bold
 *
 * Header row is dark navy w/ white bold text, filter auto-applied,
 * freeze first row, and column widths tuned for readability.
 *************************************************************/
const XLSX_COLORS = {
  HEADER_BG: '1F2937', HEADER_FG: 'FFFFFF',
  ROW_MISSED_LUNCH: 'FEE2E2',   // light red
  ROW_LATE:         'FEF3C7',   // light yellow
  ROW_BOTH:         'FED7AA',   // light orange
  CELL_LUNCH_HOT:   'DC2626',   // bright red
  CELL_LATE_HOT:    'F59E0B',   // amber
  BORDER:           'D1D5DB'
};

function styleCell(ws, r, c, style){
  const addr = XLSX.utils.encode_cell({r:r,c:c});
  if(!ws[addr]) ws[addr] = {t:'s', v:''};
  ws[addr].s = Object.assign({}, ws[addr].s||{}, style);
}

function mergeStyle(ws, r, c, partial){
  const addr = XLSX.utils.encode_cell({r:r,c:c});
  if(!ws[addr]) return;
  const prev = ws[addr].s || {};
  ws[addr].s = {
    ...prev,
    ...partial,
    font: {...(prev.font||{}), ...(partial.font||{})},
    fill: partial.fill || prev.fill,
    alignment: {...(prev.alignment||{}), ...(partial.alignment||{})},
    border: {...(prev.border||{}), ...(partial.border||{})}
  };
}

function doExportXLSX(type){
  if(typeof XLSX==='undefined' || !XLSX.utils){
    alert('Excel export library did not load. Check your internet connection and reload.');
    return;
  }
  const rows=buildRows(type);
  if(!rows.length){alert('No data to export.');return;}

  // Build AOA (array of arrays)
  const aoa=[EXPORT_HEADERS];
  rows.forEach(d=>{
    const p=d.punches;
    aoa.push([
      d.store, d.district, d.name, d.empId, d.title, d.date, dayFull(d.date), d.shift,
      p[0]?to12(p[0].slice(0,5)):'',
      p[1]?to12(p[1].slice(0,5)):'',
      p[2]?to12(p[2].slice(0,5)):'',
      p[3]?to12(p[3].slice(0,5)):'',
      d.cnt,
      d.noLunch?'YES':'No',
      d.isLate?'YES':'No',
      d.lateDetail||''
    ]);
  });

  const ws = XLSX.utils.aoa_to_sheet(aoa);

  // Column widths (characters)
  ws['!cols'] = [
    {wch:16},{wch:14},{wch:22},{wch:11},{wch:18},{wch:11},{wch:10},{wch:8},
    {wch:11},{wch:11},{wch:11},{wch:11},{wch:7},{wch:9},{wch:8},{wch:42}
  ];

  // Freeze the header row
  ws['!views'] = [{state:'frozen', ySplit:1}];

  // Enable autofilter on full data range
  const lastRow = rows.length;
  const lastCol = EXPORT_HEADERS.length - 1;
  ws['!autofilter'] = {ref: XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:lastRow,c:lastCol}})};

  // === HEADER STYLING ===
  const headerStyle = {
    fill:{patternType:'solid', fgColor:{rgb:XLSX_COLORS.HEADER_BG}},
    font:{name:'Calibri', sz:11, bold:true, color:{rgb:XLSX_COLORS.HEADER_FG}},
    alignment:{horizontal:'left', vertical:'center', wrapText:false},
    border:{
      bottom:{style:'medium', color:{rgb:'F97316'}},
      top:{style:'thin', color:{rgb:XLSX_COLORS.BORDER}}
    }
  };
  for(let c=0; c<=lastCol; c++){
    styleCell(ws, 0, c, headerStyle);
  }

  // === DATA ROW STYLING ===
  const thinBorder = {style:'thin', color:{rgb:XLSX_COLORS.BORDER}};
  rows.forEach((d, i) => {
    const r = i + 1;

    // Pick row fill color
    let rowFillRgb = null;
    if(d.noLunch && d.isLate)        rowFillRgb = XLSX_COLORS.ROW_BOTH;
    else if(d.noLunch)               rowFillRgb = XLSX_COLORS.ROW_MISSED_LUNCH;
    else if(d.isLate)                rowFillRgb = XLSX_COLORS.ROW_LATE;

    // Apply base style to every cell in the row
    for(let c=0; c<=lastCol; c++){
      const base = {
        font:{name:'Calibri', sz:10, color:{rgb:'111827'}},
        alignment:{vertical:'center'},
        border:{top:thinBorder, bottom:thinBorder, left:thinBorder, right:thinBorder}
      };
      if(rowFillRgb){
        base.fill = {patternType:'solid', fgColor:{rgb:rowFillRgb}};
      }
      styleCell(ws, r, c, base);
    }

    // Accent problem cells on top of the row color
    if(d.noLunch){
      // Total Punches (col 12) and "No Lunch" flag (col 13)
      [12, 13].forEach(c=>{
        mergeStyle(ws, r, c, {
          fill:{patternType:'solid', fgColor:{rgb:XLSX_COLORS.CELL_LUNCH_HOT}},
          font:{bold:true, color:{rgb:'FFFFFF'}},
          alignment:{horizontal:'center', vertical:'center'}
        });
      });
    }
    if(d.isLate){
      // Clock In (col 8) and "Is Late" flag (col 14)
      [8, 14].forEach(c=>{
        mergeStyle(ws, r, c, {
          fill:{patternType:'solid', fgColor:{rgb:XLSX_COLORS.CELL_LATE_HOT}},
          font:{bold:true, color:{rgb:'111827'}},
          alignment:{horizontal:'center', vertical:'center'}
        });
      });
    }
  });

  // Build workbook
  const wb = XLSX.utils.book_new();
  const sheetName = type==='violations' ? 'Missed Lunches'
                    : type==='late'      ? 'Late Arrivals'
                    : 'All Punch Data';
  XLSX.utils.book_append_sheet(wb, ws, sheetName);

  // Add a small legend sheet so managers know what the colors mean
  const legend = XLSX.utils.aoa_to_sheet([
    ['Blufox Lunch Punch Audit — Color Key'],
    [''],
    ['Row color', 'Meaning'],
    ['Light red', 'Missed lunch punch (fewer than 4 punches that day)'],
    ['Light yellow', 'Late clock-in'],
    ['Light orange', 'BOTH missed lunch AND late clock-in'],
    ['No color', 'Clean day — no issues'],
    [''],
    ['Cell color', 'Meaning'],
    ['Bright red cell (white text)', 'The exact cell causing the lunch violation (Total Punches / No Lunch)'],
    ['Amber cell', 'The exact cell causing the late flag (Clock In / Is Late)'],
    [''],
    ['Generated', new Date().toLocaleString()],
    ['Export type', type==='violations'?'Missed Lunches only':type==='late'?'Late Arrivals only':'All punch data (filtered)'],
    ['Row count', rows.length]
  ]);
  legend['!cols'] = [{wch:34}, {wch:70}];
  // Style legend header
  styleCell(legend, 0, 0, {
    font:{bold:true, sz:14, color:{rgb:'F97316'}},
    alignment:{horizontal:'left'}
  });
  // Style example color cells
  styleCell(legend, 3, 0, {fill:{patternType:'solid', fgColor:{rgb:XLSX_COLORS.ROW_MISSED_LUNCH}}, font:{bold:true}});
  styleCell(legend, 4, 0, {fill:{patternType:'solid', fgColor:{rgb:XLSX_COLORS.ROW_LATE}}, font:{bold:true}});
  styleCell(legend, 5, 0, {fill:{patternType:'solid', fgColor:{rgb:XLSX_COLORS.ROW_BOTH}}, font:{bold:true}});
  styleCell(legend, 9, 0, {fill:{patternType:'solid', fgColor:{rgb:XLSX_COLORS.CELL_LUNCH_HOT}}, font:{bold:true, color:{rgb:'FFFFFF'}}});
  styleCell(legend, 10, 0, {fill:{patternType:'solid', fgColor:{rgb:XLSX_COLORS.CELL_LATE_HOT}}, font:{bold:true}});
  XLSX.utils.book_append_sheet(wb, legend, 'Legend');

  const fn = `blufox_${type}_${new Date().toISOString().slice(0,10)}.xlsx`;
  try {
    XLSX.writeFile(wb, fn);
  } catch(err) {
    console.error('XLSX write failed:', err);
    alert('Excel export failed: '+err.message+'\n\nFalling back to CSV.');
    doExport(type);
  }
}
</script>
